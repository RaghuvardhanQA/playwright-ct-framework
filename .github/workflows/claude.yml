name: Claude Code Review

# Triggered when someone (a) comments "@claude ..." on an issue or PR,
# (b) opens a PR review with "@claude ...", or (c) creates an issue mentioning @claude.
# The Claude GitHub App handles the @claude mention parsing automatically.

on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    pull_request_review:
        types: [submitted]
    issues:
        types: [opened, assigned]

jobs:
    claude:
        if: |
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
            (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            issues: write
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Run Claude Code
              uses: anthropics/claude-code-action@v1
              with:
                  # OAuth mode — bills against the user's Claude Pro / Max subscription
                  # instead of pay-per-token API. The 3 secrets below come from
                  # `claude setup-token` (run locally, see repo README).
                  use_oauth: 'true'
                  claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
                  claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
                  claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
