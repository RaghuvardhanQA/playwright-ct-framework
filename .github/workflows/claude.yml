name: Claude Code Review

# Triggered when someone (a) comments "@claude ..." on an issue or PR,
# (b) opens a PR review with "@claude ...", or (c) creates an issue mentioning @claude.
# The Claude GitHub App handles the @claude mention parsing automatically.

on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    pull_request_review:
        types: [submitted]
    issues:
        types: [opened, assigned]

jobs:
    claude:
        if: |
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
            (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            issues: write
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Verify OAuth token secret is present
              env:
                  TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
              run: |
                  if [ -z "$TOKEN" ]; then
                      echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is empty or not set on this repo."
                      echo "Add it at Settings → Secrets and variables → Actions → New repository secret"
                      exit 1
                  fi
                  echo "Secret found. Length: ${#TOKEN} chars."

            - name: Run Claude Code
              uses: anthropics/claude-code-action@v1
              env:
                  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
              with:
                  # Pin to Sonnet 4.6 for review quality + cost balance.
                  model: claude-sonnet-4-6
